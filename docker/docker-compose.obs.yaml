services:
  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: chatbox_redis_exporter
    restart: always
    environment:
      REDIS_ADDR: "redis://chatbox_redis:6379"
    ports:
      - "127.0.0.1:9121:9121"
    networks:
      - chatbox
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          memory: 32M

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: chatbox_node_exporter
    restart: always
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - chatbox
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          memory: 32M

  pgbouncer-exporter:
    image: prometheuscommunity/pgbouncer-exporter:latest
    container_name: chatbox_pgbouncer_exporter
    restart: always
    environment:
      PGBOUNCER_EXPORTER_CONNECTION_STRING: "postgres://chatbox:chatbox@chatbox_pgbouncer:5432/pgbouncer?sslmode=disable"
    ports:
      - "127.0.0.1:9127:9127"
    networks:
      - chatbox
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          memory: 32M

  loki:
    image: grafana/loki:3.0.0
    container_name: chatbox_loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "127.0.0.1:3100:3100"
    tmpfs:
      - /loki:size=256M,uid=10001,gid=10001
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    networks:
      - chatbox
    deploy:
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  alloy:
    image: grafana/alloy:latest
    container_name: chatbox_alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    networks:
      - chatbox
    depends_on:
      - loki
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: chatbox_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    ports:
      - "127.0.0.1:9090:9090"
    tmpfs:
      - /prometheus:size=512M,uid=65534,gid=65534
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - chatbox
    deploy:
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:11.4.0
    container_name: chatbox_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=chatbox_grafana_admin
      - GF_SECURITY_ADMIN_PASSWORD=chatbox_grafana_pw
      - GF_USERS_ALLOW_SIGN_UP=false
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=PathPrefix(`/`)"
      - "traefik.http.routers.grafana.entrypoints=grafana"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.middlewares=rate-limit-general@file,security-headers@file"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - chatbox
    depends_on:
      - prometheus
      - loki
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  grafana_data:

networks:
  chatbox:
    name: chatbox_network
    external: true
